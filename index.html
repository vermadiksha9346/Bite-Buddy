<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Assistant</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  min-height: 100vh;
}

@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* HEADER */
header {
  text-align: center;
  padding: 40px;
  color: white;
}

/* BUTTON */
.toggle-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 20px;
  border-radius: 30px;
  border: none;
  background: #333;
  color: white;
  cursor: pointer;
}

/* DARK MODE */
.dark-mode {
  background: #121212;
  color: white;
}

.dark-mode .card {
  background: #1e1e1e;
}

/* CARDS */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  background: #eee;
}

.card h3 {
  padding: 15px;
  text-align: center;
}

/* CHAT HINT */
.chat-hint {
  position: fixed;
  bottom: 90px;
  right: 20px;
  background: #ff5e62;
  color: white;
  padding: 10px 15px;
  border-radius: 20px;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  50% { transform: translateY(-8px); }
}
</style>
</head>

<body>

<button class="toggle-btn" onclick="toggleMode()">🌙 Mode</button>

<header>
  <h1>🍴 Food Assistant</h1>
  <p>Find your next favorite meal</p>
</header>

<div class="container">

  <div class="card">
    <img src="https://png.pngtree.com/png-vector/20250513/ourmid/pngtree-bowl-of-tricolor-pasta-with-vegetables-and-basil-for-italian-food-png-image_16260167.png">
    <h3>Pasta</h3>
  </div>

  <div class="card">
    <img src="http://i0.wp.com/binjalsvegkitchen.com/wp-content/uploads/2025/05/Veg-Kofta-Biryani-H1.jpg?fit=600%2C900&ssl=1">
    <h3>Biryani</h3>
  </div>

  <div class="card">
    <img src="https://img.magnific.com/free-photo/top-view-homemade-delicious-salad-with-many-ingredients-plate-black-green-mix-colors-background_179666-20005.jpg?semt=ais_hybrid&w=740&q=80">
    <h3>Salad</h3>
  </div>

  <div class="card">
    <img src="https://media.istockphoto.com/id/497959594/photo/fresh-cakes.jpg?s=612x612&w=0&k=20&c=T1vp7QPbg6BY3GE-qwg-i_SqVpstyHBMIwnGakdTTek=">
    <h3>Dessert</h3>
  </div>

</div>

<div class="chat-hint">💬 Ask me what to eat!</div>

<script>
function toggleMode() {
  document.body.classList.toggle("dark-mode");
}

/* Watson Chat */
window.watsonAssistantChatOptions = {
  integrationID: "088c0e1b-aeaa-4868-bd3c-52dc391a9948",
  region: "eu-de",
  serviceInstanceID: "cc32a972-79fe-497f-b8ee-c375acd1d833",
  onLoad: async (instance) => {
    await instance.render();
  }
};

setTimeout(function () {
  const t = document.createElement('script');
  t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/latest/WatsonAssistantChatEntry.js";
  document.head.appendChild(t);
});
</script>

</body>
</html>
