<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Assistant</title>

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fad0c4, #ffdde1);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  color: #333;
}

/* Animated Background */
@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* ===== HEADER ===== */
header {
  text-align: center;
  padding: 30px;
  color: white;
}

header h1 {
  font-size: 42px;
  margin: 0;
}

header p {
  font-size: 18px;
}

/* ===== DARK MODE ===== */
.dark-mode {
  background: #121212;
  color: white;
}

.toggle-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 15px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  background: #333;
  color: white;
  z-index: 999;
}

/* ===== FOOD CARDS ===== */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  padding: 20px;
  gap: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card h3 {
  margin: 15px;
}

/* ===== CHAT BUTTON ===== */
.chat-hint {
  position: fixed;
  bottom: 90px;
  right: 20px;
  background: #ff5e62;
  color: white;
  padding: 10px 15px;
  border-radius: 20px;
  font-size: 14px;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  header h1 { font-size: 28px; }
}
</style>
</head>

<body>

<button class="toggle-btn" onclick="toggleMode()">🌙 Dark Mode</button>

<header>
  <h1>🍴 Food Assistant</h1>
  <p>Discover recipes, meals & smart suggestions</p>
</header>

<!-- FOOD CARDS -->
<div class="container">
  <div class="card">
    <img src="https://source.unsplash.com/400x300/?pasta" />
    <h3>Pasta</h3>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?biryani" />
    <h3>Biryani</h3>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?salad" />
    <h3>Healthy Salad</h3>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?dessert" />
    <h3>Desserts</h3>
  </div>
</div>

<div class="chat-hint">💬 Ask me what to eat!</div>

<script>
/* DARK MODE */
function toggleMode() {
  document.body.classList.toggle("dark-mode");
}

/* WATSON CHAT */
window.watsonAssistantChatOptions = {
  integrationID: "088c0e1b-aeaa-4868-bd3c-52dc391a9948",
  region: "eu-de",
  serviceInstanceID: "cc32a972-79fe-497f-b8ee-c375acd1d833",

  showLauncher: true,

  onLoad: async (instance) => {
    await instance.render();

    // Auto open after delay
    setTimeout(() => {
      instance.openWindow();
    }, 4000);
  }
};

setTimeout(function () {
  const t = document.createElement('script');
  t.src =
    "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
    (window.watsonAssistantChatOptions.clientVersion || 'latest') +
    "/WatsonAssistantChatEntry.js";
  document.head.appendChild(t);
});
</script>

</body>
</html>
